<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Projeto do Osvaldo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        .card {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #333;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #4fc3f7;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2em;
            color: #bbb;
        }

        .btn {
            background-color: #4fc3f7;
            color: #121212;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
        }

        .btn:hover {
            background-color: #81d4fa;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Osvaldo no Mundo Dev 💻</h1>
        <p>Meu ambiente WSL + VS Code está configurado e pronto para o combate!</p>
        <a href="https://github.com" class="btn" target="_blank">Ver meu GitHub</a>
    </div>
</body>

</html>
